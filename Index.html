<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - MyBank</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .login-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        .forgot-btn { color: #007bff; cursor: pointer; font-size: 14px; margin-top: 15px; display: block; text-decoration: underline; }
        #loader { display: none; margin-top: 20px; color: #555; font-style: italic; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleLogin()">Login</button>
        <span class="forgot-btn" onclick="alert('service not available now')">Forgot Password?</span>
        <div id="loader">Verifying credentials... (4 seconds)</div>
    </div>

    <script>
        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const loader = document.getElementById('loader');

            if (user === 'hyun67' && pass === 'hyun1590#') {
                loader.style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 4000);
            } else {
                alert('Invalid Username or Password');
            }
        }
    </script>
</body>
</html>
